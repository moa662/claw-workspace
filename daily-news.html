<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>每日要闻 · Claw</title>
<style>
:root{
  --bg:#07090f;--s1:#0e1117;--s2:#141820;--s3:#1a1f2e;
  --bd:#1e2535;--bd2:#28304a;
  --t1:#e8edf5;--t2:#8b96b0;--t3:#4a5470;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--t1);
  font-family:'PingFang SC','Microsoft YaHei','Segoe UI',system-ui,sans-serif;
  min-height:100vh;
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* ─── HERO ─── */
.hero{
  position:relative;overflow:hidden;
  padding:56px 32px 48px;text-align:center;
  background:var(--bg);
  border-bottom:1px solid var(--bd);
}
.hero-glow{
  position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:600px;height:300px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(99,102,241,.12) 0%,transparent 70%);
  pointer-events:none;
}
.back-btn{
  position:absolute;top:22px;left:28px;
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;color:var(--t3);text-decoration:none;
  padding:5px 12px;border:1px solid var(--bd);border-radius:8px;
  transition:all .2s;background:var(--s1);
}
.back-btn:hover{color:var(--t1);border-color:var(--bd2);}
.hero-pill{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);
  border-radius:20px;padding:5px 16px;margin-bottom:20px;
  font-size:11px;color:#a5b4fc;letter-spacing:.6px;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:#818cf8;
  box-shadow:0 0 8px #818cf8;
  animation:livepulse 1.8s ease-in-out infinite;
}
@keyframes livepulse{0%,100%{opacity:1;box-shadow:0 0 8px #818cf8;}50%{opacity:.4;box-shadow:0 0 3px #818cf8;}}
.hero h1{
  font-size:clamp(26px,4.5vw,44px);font-weight:800;
  letter-spacing:-1px;line-height:1.15;margin-bottom:10px;
}
.grad-text{
  background:linear-gradient(120deg,#a78bfa,#60a5fa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{font-size:13px;color:var(--t3);margin-top:6px;}
.hero-sub b{color:var(--t2);}

/* ─── LAYOUT ─── */
.page{max-width:1280px;margin:0 auto;padding:40px 28px 60px;}

/* ─── SECTION TITLE ─── */
.sec{margin-bottom:40px;}
.sec-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;
}
.sec-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.sec-info h2{font-size:15px;font-weight:700;}
.sec-info p{font-size:11px;color:var(--t3);margin-top:2px;}
.sec-line{flex:1;height:1px;background:var(--bd);}

/* ─── AI 精华卡 ─── */
.ai-card{
  background:linear-gradient(135deg,#0e1117 0%,#111827 100%);
  border:1px solid rgba(129,140,248,.2);
  border-radius:var(--radius);
  overflow:hidden;
  position:relative;
}
.ai-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(99,102,241,.08),transparent);
  pointer-events:none;
}
.ai-header{
  padding:18px 24px 14px;
  border-bottom:1px solid rgba(129,140,248,.12);
  display:flex;align-items:center;justify-content:space-between;
}
.ai-header-left{display:flex;align-items:center;gap:10px;}
.ai-badge{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;font-size:10px;font-weight:700;letter-spacing:.5px;
  padding:3px 10px;border-radius:6px;
}
.ai-title{font-size:13px;font-weight:600;color:#c7d2fe;}
.ai-meta{font-size:11px;color:var(--t3);}
.ai-body{padding:8px 0;}
.ai-item{
  display:grid;grid-template-columns:48px 1fr;align-items:start;
  padding:12px 24px;gap:0;
  border-bottom:1px solid rgba(255,255,255,.04);
  transition:background .15s;cursor:default;
}
.ai-item:last-child{border-bottom:none;}
.ai-item:hover{background:rgba(99,102,241,.05);}
.ai-rank{
  font-size:22px;font-weight:900;line-height:1.3;
  background:linear-gradient(135deg,#6366f1,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-1px;
}
.ai-text{font-size:13px;color:var(--t2);line-height:1.75;padding-top:2px;}

/* ─── 新闻网格 ─── */
.news-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:14px;
}

/* ─── 新闻卡片 ─── */
.ncard{
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:var(--radius);
  padding:20px;
  display:flex;flex-direction:column;gap:10px;
  position:relative;overflow:hidden;
  transition:transform .2s ease,border-color .25s,box-shadow .25s;
  cursor:default;
}
/* 顶部色条 */
.ncard::after{
  content:'';position:absolute;top:0;left:20px;right:20px;height:2px;
  background:var(--c);border-radius:0 0 2px 2px;
  opacity:.7;
}
.ncard:hover{
  transform:translateY(-3px);
  border-color:var(--c-bd);
  box-shadow:0 12px 32px rgba(0,0,0,.35), 0 0 0 1px var(--c-bd);
}
/* 悬浮光晕 */
.ncard::before{
  content:'';position:absolute;inset:0;border-radius:var(--radius);
  background:radial-gradient(ellipse 80% 50% at 50% -10%,var(--c-glow),transparent);
  opacity:0;transition:opacity .25s;pointer-events:none;
}
.ncard:hover::before{opacity:1;}

.ncard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.ncard-tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;letter-spacing:.5px;
  padding:3px 9px;border-radius:6px;flex-shrink:0;
  background:var(--c-tag-bg);color:var(--c-tag);
  border:1px solid var(--c-tag-bd);
}
.ncard-title{
  font-size:14px;font-weight:700;line-height:1.5;color:var(--t1);
  flex:1;
}
.ncard-desc{
  font-size:12px;color:var(--t3);line-height:1.75;
  border-left:2px solid var(--c-line);
  padding-left:10px;margin-left:2px;
}
.ncard-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:10px;border-top:1px solid var(--bd);
  margin-top:auto;
}
.ncard-src{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px;}
.ncard-src::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--c);flex-shrink:0;}
.ncard-arrow{
  font-size:12px;color:var(--t3);
  transition:color .2s,transform .2s;
}
.ncard:hover .ncard-arrow{color:var(--c);transform:translateX(3px);}

/* 颜色主题 */
.theme-intl{
  --c:#60a5fa;--c-bd:rgba(96,165,250,.25);
  --c-glow:rgba(96,165,250,.06);
  --c-line:rgba(96,165,250,.3);
  --c-tag-bg:rgba(96,165,250,.1);--c-tag:#93c5fd;--c-tag-bd:rgba(96,165,250,.2);
}
.theme-china{
  --c:#34d399;--c-bd:rgba(52,211,153,.25);
  --c-glow:rgba(52,211,153,.06);
  --c-line:rgba(52,211,153,.3);
  --c-tag-bg:rgba(52,211,153,.1);--c-tag:#6ee7b7;--c-tag-bd:rgba(52,211,153,.2);
}
.theme-tech{
  --c:#a78bfa;--c-bd:rgba(167,139,250,.25);
  --c-glow:rgba(167,139,250,.06);
  --c-line:rgba(167,139,250,.3);
  --c-tag-bg:rgba(167,139,250,.1);--c-tag:#c4b5fd;--c-tag-bd:rgba(167,139,250,.2);
}
.theme-finance{
  --c:#fb923c;--c-bd:rgba(251,146,60,.25);
  --c-glow:rgba(251,146,60,.06);
  --c-line:rgba(251,146,60,.3);
  --c-tag-bg:rgba(251,146,60,.1);--c-tag:#fdba74;--c-tag-bd:rgba(251,146,60,.2);
}

/* 分区图标背景色 */
.icon-intl{background:rgba(96,165,250,.12);}
.icon-china{background:rgba(52,211,153,.12);}
.icon-tech{background:rgba(167,139,250,.12);}
.icon-finance{background:rgba(251,146,60,.12);}

/* ─── LOADING ─── */
.loading{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:240px;gap:14px;color:var(--t3);
}
.spinner{
  width:30px;height:30px;border:2px solid var(--bd);
  border-top-color:#818cf8;border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─── FOOTER ─── */
footer{
  border-top:1px solid var(--bd);
  padding:20px 28px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;
  font-size:11px;color:var(--t3);
}
footer a{color:var(--t3);text-decoration:none;transition:color .2s;}
footer a:hover{color:var(--t1);}
.footer-right{display:flex;align-items:center;gap:16px;}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-glow"></div>
  <a class="back-btn" href="index.html">← 工作台</a>
  <div class="hero-pill"><span class="live-dot"></span>每天 08:00 自动更新</div>
  <h1>每日<span class="grad-text">全球要闻</span></h1>
  <p class="hero-sub">更新于 <b id="updateTime">加载中...</b></p>
</div>

<!-- MAIN -->
<div class="page" id="pageContent">
  <div class="loading"><div class="spinner"></div>正在加载今日要闻...</div>
</div>

<!-- FOOTER -->
<footer>
  <span>数据来源 · DeepSeek AI 每日整理 · 国际 / 国内 / 科技 / 金融</span>
  <div class="footer-right">
    <a href="index.html">← 返回工作台</a>
    <span>Claw · 普拉提IP工作台</span>
  </div>
</footer>

<script>
const CAT_THEME = {
  international:{ theme:"theme-intl",  icon:"icon-intl",  emoji:"🌍" },
  china:        { theme:"theme-china", icon:"icon-china", emoji:"🏛️" },
  tech:         { theme:"theme-tech",  icon:"icon-tech",  emoji:"💻" },
  finance:      { theme:"theme-finance",icon:"icon-finance",emoji:"📊" },
};

// 过滤掉体育板块
const HIDDEN_CATS = ["sports"];

function buildSummaryHTML(summary) {
  if(!summary||!summary.length) return '<div style="padding:20px;color:var(--t3);text-align:center;font-size:13px;">暂无摘要</div>';
  return `
    <div class="ai-body">
      ${summary.map((t,i)=>`
        <div class="ai-item">
          <div class="ai-rank">0${i+1}</div>
          <div class="ai-text">${t.replace(/^\d+[\.\、\s]+/,"")}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function buildCatHTML(cat) {
  const cfg = CAT_THEME[cat.category] || { theme:"theme-intl", icon:"icon-intl", emoji:"📌" };
  const items = (cat.items||[]);
  const cards = items.map(item=>`
    <div class="ncard ${cfg.theme}">
      <div class="ncard-top">
        <div class="ncard-title">${item.title}</div>
        ${item.tag?`<span class="ncard-tag">${item.tag}</span>`:""}
      </div>
      ${item.desc?`<div class="ncard-desc">${item.desc}</div>`:""}
      <div class="ncard-footer">
        <span class="ncard-src">${cat.label.replace(/[^\u4e00-\u9fa5a-zA-Z\s]/g,"").trim()}</span>
        ${item.link?`<a class="ncard-arrow" href="${item.link}" target="_blank" rel="noopener">查看 →</a>`:`<span class="ncard-arrow">→</span>`}
      </div>
    </div>
  `).join("");

  return `
    <div class="sec">
      <div class="sec-head">
        <div class="sec-icon ${cfg.icon}">${cfg.emoji}</div>
        <div class="sec-info">
          <h2>${cat.label}</h2>
          <p>${items.length} 条要闻</p>
        </div>
        <div class="sec-line"></div>
      </div>
      <div class="news-grid">${cards}</div>
    </div>
  `;
}

async function loadNews() {
  try {
    const res = await fetch(`news-data.json?t=${Date.now()}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // 更新时间
    document.getElementById("updateTime").textContent =
      data.updatedAtCN || data.updatedAt?.slice(0,10) || "未知";

    // 过滤掉不需要的分类
    const cats = (data.categories||[]).filter(c=>!HIDDEN_CATS.includes(c.category));

    // 拼接页面
    document.getElementById("pageContent").innerHTML = `
      <!-- AI 精华 -->
      <div class="sec">
        <div class="sec-head">
          <div class="sec-icon" style="background:rgba(99,102,241,.12);">🤖</div>
          <div class="sec-info">
            <h2>AI 今日精华</h2>
            <p>DeepSeek 跨板块精选 · 5条最值得关注</p>
          </div>
          <div class="sec-line"></div>
        </div>
        <div class="ai-card">
          <div class="ai-header">
            <div class="ai-header-left">
              <span class="ai-badge">DeepSeek</span>
              <span class="ai-title">今日全球要闻精华摘要</span>
            </div>
            <span class="ai-meta">${data.updatedAtCN||""}</span>
          </div>
          ${buildSummaryHTML(data.summary)}
        </div>
      </div>
      ${cats.map(buildCatHTML).join("")}
    `;
  } catch(e) {
    document.getElementById("updateTime").textContent = "加载失败";
    document.getElementById("pageContent").innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--t3);">
        <div style="font-size:32px;margin-bottom:16px;">⏳</div>
        <div style="font-size:14px;color:var(--t2);margin-bottom:8px;">新闻数据将于每天 08:00 自动更新</div>
        <div style="font-size:12px;">首次可前往 GitHub Actions 手动触发</div>
      </div>`;
  }
}

loadNews();
</script>
</body>
</html>
