<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>每日要闻 · Claw</title>
<style>
:root{
  --bg:#0a0c10;--s1:#111318;--s2:#181c24;--s3:#1e2330;
  --bd:#252b3b;--bd2:#2e3650;
  --a1:#c8a96e;--a2:#e8c98a;--a3:#8b6c3e;
  --g1:#4ade80;--b1:#60a5fa;--p1:#c084fc;--r1:#f87171;--o1:#fb923c;
  --t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--t1);
  font-family:'PingFang SC','Microsoft YaHei','Segoe UI',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

/* HERO */
.hero{
  padding:52px 24px 44px;text-align:center;position:relative;overflow:hidden;
  background:linear-gradient(160deg,#0a0c10 0%,#0d1420 60%,#0a0c10 100%);
  border-bottom:1px solid var(--bd);
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(96,165,250,.07),transparent);
  pointer-events:none;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  border:1px solid rgba(96,165,250,.35);border-radius:20px;
  padding:5px 16px;font-size:12px;color:var(--b1);
  background:rgba(96,165,250,.07);margin-bottom:20px;letter-spacing:.5px;
}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--b1);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.85);}}
.hero h1{font-size:clamp(24px,4vw,40px);font-weight:800;letter-spacing:-.5px;line-height:1.2;margin-bottom:10px;}
.hero h1 .brand{background:linear-gradient(135deg,var(--b1),var(--p1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-meta{font-size:13px;color:var(--t3);margin-top:8px;}
.hero-meta span{color:var(--t2);}

/* BACK */
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  position:absolute;top:20px;left:24px;
  font-size:12px;color:var(--t3);text-decoration:none;
  padding:5px 12px;border:1px solid var(--bd);border-radius:8px;
  transition:color .2s,border-color .2s;
}
.back-btn:hover{color:var(--t1);border-color:var(--bd2);}

/* MAIN */
main{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:40px 24px;}

/* SECTION LABEL */
.section-label{
  display:flex;align-items:center;gap:10px;
  font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--t3);margin-bottom:20px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--bd);}

/* AI 摘要 */
.summary-block{
  background:linear-gradient(135deg,rgba(96,165,250,.08),rgba(192,132,252,.08));
  border:1px solid rgba(96,165,250,.25);border-radius:var(--radius);
  padding:24px 28px;margin-bottom:40px;
}
.summary-block h2{
  font-size:14px;font-weight:700;color:var(--b1);
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.summary-list{display:flex;flex-direction:column;gap:10px;}
.summary-item{
  display:flex;align-items:flex-start;gap:12px;
  font-size:13px;color:var(--t2);line-height:1.65;
}
.summary-num{
  min-width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--b1),var(--p1));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#000;flex-shrink:0;margin-top:1px;
}

/* 新闻分类网格 */
.news-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;margin-bottom:48px;
}
.news-col{
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--radius);
  overflow:hidden;
}
.news-col-header{
  padding:16px 20px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
}
.news-col-title{font-size:14px;font-weight:700;}
.news-col-count{font-size:11px;color:var(--t3);}
.news-items{display:flex;flex-direction:column;}
.news-item{
  padding:14px 20px;border-bottom:1px solid var(--bd);
  transition:background .15s;
}
.news-item:last-child{border-bottom:none;}
.news-item:hover{background:var(--s2);}
.news-item-title{
  font-size:13px;font-weight:600;line-height:1.5;margin-bottom:6px;color:var(--t1);
}
.news-item-title a{color:inherit;text-decoration:none;}
.news-item-title a:hover{color:var(--b1);}
.news-item-desc{font-size:12px;color:var(--t3);line-height:1.6;margin-bottom:8px;}
.news-item-meta{display:flex;align-items:center;gap:8px;}
.news-source{
  font-size:10px;font-weight:600;letter-spacing:.5px;
  padding:2px 8px;border-radius:4px;
  background:rgba(255,255,255,.06);color:var(--t3);
}
.news-time{font-size:10px;color:var(--t3);}

/* 空状态 */
.empty-state{
  padding:40px 20px;text-align:center;color:var(--t3);font-size:13px;
}
.empty-state .icon{font-size:32px;margin-bottom:12px;}

/* LOADING */
.loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:300px;gap:16px;color:var(--t3);font-size:13px;
}
.spinner{
  width:32px;height:32px;border:2px solid var(--bd);
  border-top-color:var(--b1);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* FOOTER */
footer{text-align:center;padding:24px;font-size:12px;color:var(--t3);border-top:1px solid var(--bd);}
footer a{color:var(--t3);text-decoration:none;}
footer a:hover{color:var(--t1);}

/* 色彩配置 */
.cat-international .news-col-title{color:#60a5fa;}
.cat-china .news-col-title{color:#4ade80;}
.cat-finance .news-col-title{color:#fb923c;}
</style>
</head>
<body>

<div class="hero">
  <a class="back-btn" href="index.html">← 工作台</a>
  <div class="hero-badge"><span class="dot"></span>每天 08:00 自动更新</div>
  <h1>每日<span class="brand">全球要闻</span></h1>
  <div class="hero-meta">更新时间：<span id="updateTime">加载中...</span></div>
</div>

<main>

  <!-- AI 今日要点 -->
  <div class="section-label">AI 今日要点</div>
  <div class="summary-block">
    <h2>🤖 DeepSeek 精选 · 今日5条最值得关注</h2>
    <div class="summary-list" id="summaryList">
      <div class="loading"><div class="spinner"></div>正在加载...</div>
    </div>
  </div>

  <!-- 新闻分类 -->
  <div class="section-label">分类要闻</div>
  <div class="news-grid" id="newsGrid">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>正在加载新闻...</div>
  </div>

</main>

<footer>
  数据来源：Reuters · BBC · 新华社 · Bloomberg · 财联社 &nbsp;·&nbsp;
  <a href="index.html">← 返回工作台</a>
</footer>

<script>
const CAT_CONFIG = {
  international: { label: "🌍 国际要闻", cls: "cat-international" },
  china:         { label: "🇨🇳 国内要闻", cls: "cat-china" },
  finance:       { label: "📈 财经动态",  cls: "cat-finance" },
};

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  } catch { return iso; }
}

function renderSummary(items) {
  const el = document.getElementById("summaryList");
  if (!items || items.length === 0) {
    el.innerHTML = '<div style="color:var(--t3);font-size:13px;">暂无摘要</div>';
    return;
  }
  el.innerHTML = items.map((text, i) => `
    <div class="summary-item">
      <div class="summary-num">${i + 1}</div>
      <div>${text.replace(/^\d+\.\s*/, "")}</div>
    </div>
  `).join("");
}

function renderNews(categories) {
  const grid = document.getElementById("newsGrid");
  if (!categories || categories.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无新闻数据</div>';
    return;
  }
  grid.innerHTML = categories.map((cat) => {
    const cfg = CAT_CONFIG[cat.category] || { label: cat.label, cls: "" };
    const items = cat.items || [];
    const itemsHTML = items.length === 0
      ? '<div class="empty-state"><div class="icon">📭</div>暂无数据</div>'
      : items.map((item) => `
          <div class="news-item">
            <div class="news-item-title">
              ${item.link
                ? `<a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>`
                : item.title}
            </div>
            ${item.desc ? `<div class="news-item-desc">${item.desc}...</div>` : ""}
            <div class="news-item-meta">
              <span class="news-source">${cat.label.replace(/[🌍🇨🇳📈]\s*/u, "")}</span>
              ${item.pubDate ? `<span class="news-time">${item.pubDate.slice(0, 16)}</span>` : ""}
            </div>
          </div>
        `).join("");

    return `
      <div class="news-col ${cfg.cls}">
        <div class="news-col-header">
          <div class="news-col-title">${cfg.label}</div>
          <div class="news-col-count">${items.length} 条</div>
        </div>
        <div class="news-items">${itemsHTML}</div>
      </div>
    `;
  }).join("");
}

async function loadNews() {
  try {
    const res = await fetch(`news-data.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    document.getElementById("updateTime").textContent =
      data.updatedAtCN || formatDate(data.updatedAt) || "未知";

    renderSummary(data.summary);
    renderNews(data.categories);
  } catch (e) {
    console.error(e);
    document.getElementById("updateTime").textContent = "数据加载失败";
    document.getElementById("summaryList").innerHTML =
      `<div style="color:var(--r1);font-size:13px;">⚠️ 新闻数据暂未生成，GitHub Actions 将在今天 08:00 自动运行。<br>也可前往 GitHub 仓库手动触发 workflow。</div>`;
    document.getElementById("newsGrid").innerHTML =
      `<div class="empty-state" style="grid-column:1/-1">
        <div class="icon">⏳</div>
        数据将于每天 08:00 自动更新<br>
        <span style="font-size:11px;margin-top:8px;display:block;">首次需手动在 GitHub Actions 触发</span>
      </div>`;
  }
}

loadNews();
</script>
</body>
</html>
