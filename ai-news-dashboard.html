<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 工具动态新闻助手</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #141720;
      --surface2: #1c2030;
      --border: #252a3a;
      --accent: #4f8ef7;
      --accent2: #a855f7;
      --accent3: #22d3ee;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --card-radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      background: linear-gradient(135deg, #0a0d16 0%, #111827 60%, #0d1420 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    /* 左侧品牌区 */
    .header-brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .brand-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 16px rgba(79,142,247,0.3);
    }
    .brand-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .brand-title span { color: var(--accent); }
    .brand-subtitle {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.3px;
      padding-left: 48px;
    }
    /* 中间每日一语 */
    .header-quote {
      flex: 1;
      margin: 0 32px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      border-left: 3px solid var(--accent);
      min-width: 0;
    }
    .quote-label {
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .quote-text {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .quote-author {
      font-size: 11px;
      color: var(--text3);
      margin-top: 3px;
    }
    .logo { display: none; } /* 兼容旧类名 */

    .header-meta {
      display: flex; align-items: center; gap: 16px;
    }
    .date-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text2);
    }
    .today-count {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      color: var(--text2);
    }
    .today-count strong {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
    }
    /* 视图切换 */
    .view-toggle {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .view-btn {
      padding: 6px 10px;
      border: none;
      background: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
      line-height: 1;
    }
    .view-btn:hover { color: var(--text); background: var(--surface); }
    .view-btn.active { color: var(--accent); background: rgba(79,142,247,0.12); }
    .live-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--green);
    }
    .live-dot::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* ─── LAYOUT ─── */
    .layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 24px 60px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
    }

    /* ─── SIDEBAR ─── */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-header .icon { font-size: 14px; }

    /* Category nav */
    .cat-list { padding: 8px; }
    .cat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .cat-item:hover { background: var(--surface2); }
    .cat-item.active { background: rgba(79, 142, 247, 0.12); }
    .cat-item.active .cat-name { color: var(--accent); }
    .cat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cat-name { font-size: 13px; flex: 1; }
    .cat-count {
      font-size: 11px;
      color: var(--text3);
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 10px;
    }
    .cat-item.active .cat-count {
      background: rgba(79, 142, 247, 0.2);
      color: var(--accent);
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }
    .stat-cell {
      background: var(--surface);
      padding: 14px;
      text-align: center;
    }
    .stat-cell .num { font-size: 22px; font-weight: 700; }
    .stat-cell .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }

    /* Subscribe */
    .sub-body { padding: 14px 16px; }
    .sub-desc { font-size: 12px; color: var(--text2); margin-bottom: 12px; line-height: 1.6; }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .tag {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text2);
    }
    .tag:hover { border-color: var(--accent); color: var(--accent); }
    .tag.active {
      background: rgba(79, 142, 247, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .sub-input-row { display: flex; gap: 6px; }
    .sub-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .sub-input:focus { border-color: var(--accent); }
    .sub-input::placeholder { color: var(--text3); }
    .btn-add {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* ─── MAIN CONTENT ─── */
    .main { min-width: 0; }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 14px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      flex: 1;
    }
    .search-box input::placeholder { color: var(--text3); }
    .search-icon { color: var(--text3); font-size: 14px; }

    .filter-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }
    .ftab {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text2);
      border: none;
      background: none;
    }
    .ftab:hover { color: var(--text); }
    .ftab.active {
      background: var(--accent);
      color: #fff;
    }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 12px;
      color: var(--text2);
      outline: none;
      cursor: pointer;
    }

    /* News cards */
    .news-grid { display: flex; flex-direction: column; gap: 14px; }
    .news-grid.grid-view {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .news-grid.grid-view .card-summary {
      -webkit-line-clamp: 3;
    }
    @media (max-width: 1200px) {
      .news-grid.grid-view { grid-template-columns: repeat(2, 1fr); }
    }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 18px 20px;
      transition: all 0.2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .news-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--card-accent, var(--accent));
      opacity: 0;
      transition: opacity 0.2s;
    }
    .news-card:hover {
      border-color: rgba(79, 142, 247, 0.4);
      background: var(--surface2);
      transform: translateX(2px);
    }
    .news-card:hover::before { opacity: 1; }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .company-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid currentColor;
      opacity: 0.85;
    }
    .company-logo { font-size: 13px; }
    .tag-badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .tag-product { background: rgba(79,142,247,.15); color: var(--accent); }
    .tag-tech { background: rgba(168,85,247,.15); color: var(--accent2); }
    .tag-strategy { background: rgba(34,211,238,.15); color: var(--accent3); }
    .tag-personnel { background: rgba(251,191,36,.15); color: var(--yellow); }
    .tag-partnership { background: rgba(52,211,153,.15); color: var(--green); }

    .card-time {
      margin-left: auto;
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
      color: var(--text);
    }

    .card-summary {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-card.expanded .card-summary {
      -webkit-line-clamp: unset;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .source-link {
      font-size: 11px;
      color: var(--text3);
      text-decoration: none;
      display: flex; align-items: center; gap: 4px;
    }
    .source-link:hover { color: var(--accent); }
    .read-more {
      margin-left: auto;
      font-size: 12px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .read-more:hover { text-decoration: underline; }

    /* Hot badge */
    .hot-badge {
      background: linear-gradient(135deg, #f87171, #fb923c);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }

    /* Pagination / Load more */
    .load-more-area {
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }
    .btn-load {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 28px;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-load:hover { border-color: var(--accent); color: var(--accent); }

    /* Archive modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 640px;
      max-width: 92vw;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: scale(0.95);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-head h2 { font-size: 16px; font-weight: 600; }
    .modal-close {
      background: var(--surface2); border: none;
      width: 28px; height: 28px; border-radius: 6px;
      cursor: pointer; color: var(--text2);
      font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }

    .archive-month { margin-bottom: 20px; }
    .archive-month h3 {
      font-size: 13px; font-weight: 600;
      color: var(--text2); margin-bottom: 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .archive-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: opacity 0.2s;
    }
    .archive-item:hover { opacity: 0.75; }
    .archive-item:last-child { border-bottom: none; }
    .archive-date { font-size: 11px; color: var(--text3); min-width: 36px; }
    .archive-title { font-size: 13px; line-height: 1.4; flex: 1; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: all 0.3s;
      z-index: 300;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: grid; grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .header-inner { padding: 0; }
      .layout { padding: 16px; gap: 16px; }
      .sidebar { grid-template-columns: 1fr; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    /* Section divider */
    .section-label {
      font-size: 12px; font-weight: 600;
      color: var(--text3); letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 0 4px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1; height: 1px;
      background: var(--border);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ─── 日期分组 ─── */
    .date-group { margin-bottom: 8px; }
    .date-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0 8px;
      margin-bottom: 4px;
    }
    .date-group-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .date-group-label.today { color: var(--accent); }
    .date-group-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .date-group-count {
      font-size: 11px;
      color: var(--text3);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    /* ─── 榜单模块 ─── */
    .charts-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 24px 0;
    }
    .charts-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .charts-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 1100px) {
      .charts-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .chart-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .chart-panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chart-panel-icon { font-size: 15px; }
    .chart-panel-title {
      font-size: 13px;
      font-weight: 700;
      flex: 1;
    }
    .chart-panel-count {
      font-size: 11px;
      color: var(--text3);
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 8px;
    }
    .chart-list {
      padding: 6px 0;
      height: 340px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .chart-list::-webkit-scrollbar { width: 4px; }
    .chart-list::-webkit-scrollbar-track { background: transparent; }
    .chart-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .chart-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .chart-item:hover { background: var(--surface2); }
    .chart-rank {
      font-size: 12px;
      font-weight: 700;
      min-width: 18px;
      text-align: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .chart-rank.rank-1 { color: #fbbf24; }
    .chart-rank.rank-2 { color: #94a3b8; }
    .chart-rank.rank-3 { color: #cd7c3a; }
    .chart-rank.rank-other { color: var(--text3); }
    .chart-item-body { flex: 1; min-width: 0; }
    .chart-item-title {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .chart-item-meta {
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chart-item-tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 500;
    }
  /* 返回主页按钮 */
  .back-home-btn {
    position: fixed; top: 16px; left: 16px; z-index: 999;
    background: rgba(30,35,48,0.85); backdrop-filter: blur(8px);
    border: 1px solid rgba(200,169,110,0.3); color: #c8a96e;

async function init() {
  // 尝试加载远程 JSON 数据
  try {
    const res = await fetch('ai-news-data.json?t=' + Date.now());
    if (res.ok) {
      const json = await res.json();
      if (Array.isArray(json.news) && json.news.length > 0) {
        // 替换全局 NEWS_DATA
        NEWS_DATA.length = 0;
        json.news.forEach(n => NEWS_DATA.push(n));
        console.log(`✅ 已从 ai-news-data.json 加载 ${NEWS_DATA.length} 条新闻（更新于 ${json.updatedAtCN || json.updatedAt}）`);
        // 更新 live dot 旁的时间提示
        const liveEl = document.querySelector('.live-dot');
        if (liveEl && json.updatedAtCN) liveEl.title = `最后更新：${json.updatedAtCN}`;
      }
    }
  } catch(e) {
    console.warn('⚠️ ai-news-data.json 加载失败，使用内置数据:', e.message);
  }

  // 每日一语
  const q = getTodayQuote();
  document.getElementById('quoteText').textContent = q.text;
  document.getElementById('quoteAuthor').textContent = q.author;

  // 今日条数
  const todayStr = new Date().toISOString().slice(0,10);
  const todayCount = NEWS_DATA.filter(n => n.time === todayStr).length;
  document.getElementById('todayCount').textContent = todayCount || NEWS_DATA.length;

  // Category nav
  renderCatList();
  // Tags
  renderTagCloud();
  // Stats
  updateStats();
  // News
  renderNews();
  // Archive
  renderArchive();
  // Charts
  renderCharts();
}

function getFiltered() {
  let data = [...NEWS_DATA];
  if (activeCompany !== 'all') data = data.filter(n => n.company === activeCompany);
  if (activeFilter !== 'all') data = data.filter(n => n.tag === activeFilter);
  if (searchQuery) data = data.filter(n =>
    n.title.toLowerCase().includes(searchQuery) ||
    n.summary.toLowerCase().includes(searchQuery));

  // Sort
  if (sortMode === 'time') {
    data.sort((a, b) => b.time.localeCompare(a.time));
  } else if (sortMode === 'hot') {
    data.sort((a, b) => (b.hot ? 1 : 0) - (a.hot ? 1 : 0) || b.time.localeCompare(a.time));
  } else if (sortMode === 'company') {
    data.sort((a, b) => a.company.localeCompare(b.company));
  }
  return data;
}

const TAG_CLASS = {
  '产品发布': 'tag-product',
  '技术突破': 'tag-tech',
  '战略合作': 'tag-strategy',
  '人事变动': 'tag-personnel',
  '行业动态': 'tag-partnership',
};

function getDateLabel(dateStr) {
  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (dateStr === today) return { label: '今天', isToday: true };
  if (dateStr === yesterday) return { label: '昨天', isToday: false };
  // 计算天数差
  const diff = Math.round((new Date(today) - new Date(dateStr)) / 86400000);
  if (diff <= 7) return { label: `${diff} 天前`, isToday: false };
  return { label: dateStr, isToday: false };
}

function renderCardHTML(n) {
  const co = COMPANIES.find(c => c.id === n.company) || COMPANIES[0];
  const tagCls = TAG_CLASS[n.tag] || 'tag-product';
  return `
    <div class="news-card" id="card-${n.id}" style="--card-accent:${co.color}" onclick="toggleCard(${n.id})">
      <div class="card-top">
        <div class="company-badge" style="color:${co.color};border-color:${co.color}">
          <span class="company-logo">${co.emoji}</span>${co.name}
        </div>
        <span class="tag-badge ${tagCls}">${n.tag}</span>
        ${n.hot ? '<span class="hot-badge">🔥 热点</span>' : ''}
        <span class="card-time">${n.source}</span>
      </div>
      <div class="card-title">${n.title}</div>
      <div class="card-summary">${n.summary}</div>
      <div class="card-bottom">
        <a class="source-link" href="${n.sourceUrl}" target="_blank" onclick="event.stopPropagation()">
          🔗 ${n.source}
        </a>
        <span style="font-size:11px;color:var(--text3)">📅 ${n.time}</span>
        <button class="read-more" onclick="event.stopPropagation();toggleCard(${n.id})">展开全文 ▾</button>
      </div>
    </div>`;
}

function renderNews() {
  const filtered = getFiltered();
  const visible = filtered.slice(0, visibleCount);
  const grid = document.getElementById('newsGrid');

  // 更新视图模式
  grid.className = viewMode === 'grid' ? 'news-grid grid-view' : 'news-grid';

  if (visible.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>没有找到相关新闻，请调整筛选条件</p></div>`;
    document.getElementById('loadMoreBtn').style.display = 'none';
    return;
  }

  // 宫格模式不分组，直接渲染
  if (viewMode === 'grid') {
    grid.innerHTML = visible.map(n => renderCardHTML(n)).join('');
  } else {
    // 列表模式按日期分组
    const groups = {};
    const groupOrder = [];
    visible.forEach(n => {
      if (!groups[n.time]) {
        groups[n.time] = [];
        groupOrder.push(n.time);
      }
      groups[n.time].push(n);
    });

    grid.innerHTML = groupOrder.map(date => {
      const { label, isToday } = getDateLabel(date);
      const items = groups[date];
      return `
        <div class="date-group">
          <div class="date-group-header">
            <span class="date-group-label${isToday ? ' today' : ''}">${label}</span>
            <div class="date-group-line"></div>
            <span class="date-group-count">${items.length} 条</span>
          </div>
          ${items.map(n => renderCardHTML(n)).join('')}
        </div>`;
    }).join('');
  }

  const btn = document.getElementById('loadMoreBtn');
  btn.style.display = filtered.length > visibleCount ? 'block' : 'none';

  // 检测摘要是否真的溢出
  requestAnimationFrame(checkReadMoreVisibility);
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  card.classList.toggle('expanded');
  const btn = card.querySelector('.read-more');
  if (btn) btn.textContent = card.classList.contains('expanded') ? '收起 ▴' : '展开全文 ▾';
}

// 渲染后检测每张卡片的摘要是否真的溢出，没溢出就隐藏"展开全文"按钮
function checkReadMoreVisibility() {
  document.querySelectorAll('.news-card').forEach(card => {
    const summary = card.querySelector('.card-summary');
    const btn = card.querySelector('.read-more');
    if (!summary || !btn) return;
    // 未展开状态下，scrollHeight > clientHeight 说明有被截断
    if (!card.classList.contains('expanded') && summary.scrollHeight <= summary.clientHeight + 2) {
      btn.style.visibility = 'hidden';
    } else {
      btn.style.visibility = 'visible';
    }
  });
}

function loadMore() {
  visibleCount += 6;
  renderNews();
}

}

function openArchive() {
  document.getElementById('archiveModal').classList.add('open');
}
function closeArchive() {
  document.getElementById('archiveModal').classList.remove('open');
}
document.getElementById('archiveModal').addEventListener('click', function(e) {
  if (e.target === this) closeArchive();
});

// ─────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────
//  VIEW TOGGLE
// ─────────────────────────────────────────
function setView(mode) {
  viewMode = mode;
  document.getElementById('viewList').classList.toggle('active', mode === 'list');
  document.getElementById('viewGrid').classList.toggle('active', mode === 'grid');
  renderNews();
}

// ─────────────────────────────────────────
//  CHARTS 榜单
// ─────────────────────────────────────────
function renderCharts() {
  const container = document.getElementById('chartsGrid');

  // 1. 🔥 热榜 — 按热点+时间排序
  const hotList = [...NEWS_DATA]
    .sort((a,b) => (b.hot?1:0)-(a.hot?1:0) || b.time.localeCompare(a.time))
    .slice(0, 12);

  // 2. 🏢 公司动态 — 每家公司最新一条，按数量多的公司排前
  const coMap = {};
  NEWS_DATA.forEach(n => {
    if (!coMap[n.company]) coMap[n.company] = [];
    coMap[n.company].push(n);
  });
  const coList = Object.entries(coMap)
    .sort((a,b) => b[1].length - a[1].length)
    .map(([coId, items]) => {
      const co = COMPANIES.find(c => c.id === coId) || COMPANIES[0];
      const latest = items.sort((a,b) => b.time.localeCompare(a.time))[0];
      return { co, news: latest, count: items.length };
    })
    .slice(0, 12);

  // 3. 📋 事件类型 — 按tag分组，每组取最热的一条
  const tagGroups = { '产品发布':[], '技术突破':[], '战略合作':[], '人事变动':[], '行业动态':[] };
  NEWS_DATA.forEach(n => { if (tagGroups[n.tag]) tagGroups[n.tag].push(n); });
  const typeList = Object.entries(tagGroups)
    .filter(([,items]) => items.length > 0)
    .map(([tag, items]) => {
      const top = items.sort((a,b) => (b.hot?1:0)-(a.hot?1:0) || b.time.localeCompare(a.time))[0];
      return { tag, count: items.length, news: top };
    });
  // 展开成标题列表
  const typeListFlat = [];
  Object.entries(tagGroups).forEach(([tag, items]) => {
    items.sort((a,b) => (b.hot?1:0)-(a.hot?1:0)).forEach(n => typeListFlat.push({...n, tagLabel: tag}));
  });
  const typeSorted = typeListFlat.slice(0, 12);

  // 4. ⭐ 影响力 — 分3层：全球级/行业级/公司级（用hot+公司规模判断）
  const globalCos = new Set(['openai','anthropic','google','meta','microsoft','nvidia','apple','xai']);
  const impList = [...NEWS_DATA].map(n => {
    let level, levelColor;
    if (n.hot && globalCos.has(n.company)) { level = '全球级'; levelColor = '#f87171'; }
    else if (n.hot) { level = '行业级'; levelColor = '#fbbf24'; }
    else { level = '公司级'; levelColor = '#94a3b8'; }
    return { ...n, level, levelColor };
  }).sort((a,b) => {
    const order = { '全球级':0, '行业级':1, '公司级':2 };
    return order[a.level] - order[b.level] || b.time.localeCompare(a.time);
  }).slice(0, 12);

  function rankClass(i) {
    if (i === 0) return 'rank-1';
    if (i === 1) return 'rank-2';
    if (i === 2) return 'rank-3';
    return 'rank-other';
  }

  const panels = [
    {
      icon: '🔥', title: '热榜', count: hotList.length,
      html: hotList.map((n,i) => {
        const co = COMPANIES.find(c => c.id === n.company) || COMPANIES[0];
        return `<div class="chart-item" onclick="scrollToCard(${n.id})">
          <span class="chart-rank ${rankClass(i)}">${i+1}</span>
          <div class="chart-item-body">
            <div class="chart-item-title">${n.title}</div>
            <div class="chart-item-meta">
              <span style="color:${co.color}">${co.emoji} ${co.name}</span>
              <span>${n.relTime}</span>
            </div>
          </div>
        </div>`;
      }).join('')
    },
    {
      icon: '🏢', title: '公司动态', count: coList.length,
      html: coList.map((item,i) => `
        <div class="chart-item" onclick="selectCompany('${item.co.id}')">
          <span class="chart-rank ${rankClass(i)}">${i+1}</span>
          <div class="chart-item-body">
            <div class="chart-item-title">${item.news.title}</div>
            <div class="chart-item-meta">
              <span style="color:${item.co.color}">${item.co.emoji} ${item.co.name}</span>
              <span>${item.count}条动态</span>
            </div>
          </div>
        </div>`).join('')
    },
    {
      icon: '📋', title: '事件类型', count: typeSorted.length,
      html: typeSorted.map((n,i) => {
        const co = COMPANIES.find(c => c.id === n.company) || COMPANIES[0];
        const tagCls = TAG_CLASS[n.tagLabel] || 'tag-product';
        return `<div class="chart-item" onclick="scrollToCard(${n.id})">
          <span class="chart-rank ${rankClass(i)}">${i+1}</span>
          <div class="chart-item-body">
            <div class="chart-item-title">${n.title}</div>
            <div class="chart-item-meta">
              <span class="chart-item-tag ${tagCls}">${n.tagLabel}</span>
              <span style="color:${co.color}">${co.emoji}</span>
            </div>
          </div>
        </div>`;
      }).join('')
    },
    {
      icon: '⭐', title: '影响力', count: impList.length,
      html: impList.map((n,i) => {
        const co = COMPANIES.find(c => c.id === n.company) || COMPANIES[0];
        return `<div class="chart-item" onclick="scrollToCard(${n.id})">
          <span class="chart-rank ${rankClass(i)}">${i+1}</span>
          <div class="chart-item-body">
            <div class="chart-item-title">${n.title}</div>
            <div class="chart-item-meta">
              <span style="color:${n.levelColor};font-weight:600">${n.level}</span>
              <span style="color:${co.color}">${co.emoji} ${co.name}</span>
            </div>
          </div>
        </div>`;
      }).join('')
    }
  ];

  container.innerHTML = panels.map(p => `
    <div class="chart-panel">
      <div class="chart-panel-head">
        <span class="chart-panel-icon">${p.icon}</span>
        <span class="chart-panel-title">${p.title}</span>
        <span class="chart-panel-count">${p.count}条</span>
      </div>
      <div class="chart-list">${p.html}</div>
    </div>`).join('');
}

function scrollToCard(id) {
  // 先确保 news grid 显示了这张卡片
  const card = document.getElementById('card-' + id);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.style.outline = '2px solid var(--accent)';
    setTimeout(() => card.style.outline = '', 1500);
  } else {
    // 卡片还没渲染，增加 visibleCount 后重新渲染
    visibleCount = NEWS_DATA.length;
    renderNews();
    setTimeout(() => {
      const c = document.getElementById('card-' + id);
      if (c) { c.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    }, 100);
  }
}

// ─────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────
//  KEYBOARD
// ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeArchive();
});

// GO
init();
</script>
