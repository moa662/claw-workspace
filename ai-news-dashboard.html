<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 工具动态新闻助手</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #141720;
      --surface2: #1c2030;
      --border: #252a3a;
      --accent: #4f8ef7;
      --accent2: #a855f7;
      --accent3: #22d3ee;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --card-radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      background: linear-gradient(135deg, #0d0f14 0%, #13182a 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .logo span { color: var(--accent); }

    .header-meta {
      display: flex; align-items: center; gap: 16px;
    }
    .date-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text2);
    }
    .live-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--green);
    }
    .live-dot::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* ─── LAYOUT ─── */
    .layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 24px 60px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
    }

    /* ─── SIDEBAR ─── */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-header .icon { font-size: 14px; }

    /* Category nav */
    .cat-list { padding: 8px; }
    .cat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .cat-item:hover { background: var(--surface2); }
    .cat-item.active { background: rgba(79, 142, 247, 0.12); }
    .cat-item.active .cat-name { color: var(--accent); }
    .cat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cat-name { font-size: 13px; flex: 1; }
    .cat-count {
      font-size: 11px;
      color: var(--text3);
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 10px;
    }
    .cat-item.active .cat-count {
      background: rgba(79, 142, 247, 0.2);
      color: var(--accent);
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }
    .stat-cell {
      background: var(--surface);
      padding: 14px;
      text-align: center;
    }
    .stat-cell .num { font-size: 22px; font-weight: 700; }
    .stat-cell .lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }

    /* Subscribe */
    .sub-body { padding: 14px 16px; }
    .sub-desc { font-size: 12px; color: var(--text2); margin-bottom: 12px; line-height: 1.6; }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .tag {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text2);
    }
    .tag:hover { border-color: var(--accent); color: var(--accent); }
    .tag.active {
      background: rgba(79, 142, 247, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .sub-input-row { display: flex; gap: 6px; }
    .sub-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .sub-input:focus { border-color: var(--accent); }
    .sub-input::placeholder { color: var(--text3); }
    .btn-add {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* ─── MAIN CONTENT ─── */
    .main { min-width: 0; }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 14px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      flex: 1;
    }
    .search-box input::placeholder { color: var(--text3); }
    .search-icon { color: var(--text3); font-size: 14px; }

    .filter-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }
    .ftab {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text2);
      border: none;
      background: none;
    }
    .ftab:hover { color: var(--text); }
    .ftab.active {
      background: var(--accent);
      color: #fff;
    }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 12px;
      color: var(--text2);
      outline: none;
      cursor: pointer;
    }

    /* News cards */
    .news-grid { display: flex; flex-direction: column; gap: 14px; }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 18px 20px;
      transition: all 0.2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .news-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--card-accent, var(--accent));
      opacity: 0;
      transition: opacity 0.2s;
    }
    .news-card:hover {
      border-color: rgba(79, 142, 247, 0.4);
      background: var(--surface2);
      transform: translateX(2px);
    }
    .news-card:hover::before { opacity: 1; }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .company-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid currentColor;
      opacity: 0.85;
    }
    .company-logo { font-size: 13px; }
    .tag-badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .tag-product { background: rgba(79,142,247,.15); color: var(--accent); }
    .tag-tech { background: rgba(168,85,247,.15); color: var(--accent2); }
    .tag-strategy { background: rgba(34,211,238,.15); color: var(--accent3); }
    .tag-personnel { background: rgba(251,191,36,.15); color: var(--yellow); }
    .tag-partnership { background: rgba(52,211,153,.15); color: var(--green); }

    .card-time {
      margin-left: auto;
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
      color: var(--text);
    }

    .card-summary {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-card.expanded .card-summary {
      -webkit-line-clamp: unset;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .source-link {
      font-size: 11px;
      color: var(--text3);
      text-decoration: none;
      display: flex; align-items: center; gap: 4px;
    }
    .source-link:hover { color: var(--accent); }
    .read-more {
      margin-left: auto;
      font-size: 12px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .read-more:hover { text-decoration: underline; }

    /* Hot badge */
    .hot-badge {
      background: linear-gradient(135deg, #f87171, #fb923c);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }

    /* Pagination / Load more */
    .load-more-area {
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }
    .btn-load {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 28px;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-load:hover { border-color: var(--accent); color: var(--accent); }

    /* Archive modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 640px;
      max-width: 92vw;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: scale(0.95);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-head h2 { font-size: 16px; font-weight: 600; }
    .modal-close {
      background: var(--surface2); border: none;
      width: 28px; height: 28px; border-radius: 6px;
      cursor: pointer; color: var(--text2);
      font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }

    .archive-month { margin-bottom: 20px; }
    .archive-month h3 {
      font-size: 13px; font-weight: 600;
      color: var(--text2); margin-bottom: 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .archive-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: opacity 0.2s;
    }
    .archive-item:hover { opacity: 0.75; }
    .archive-item:last-child { border-bottom: none; }
    .archive-date { font-size: 11px; color: var(--text3); min-width: 36px; }
    .archive-title { font-size: 13px; line-height: 1.4; flex: 1; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: all 0.3s;
      z-index: 300;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: grid; grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .header-inner { padding: 0; }
      .layout { padding: 16px; gap: 16px; }
      .sidebar { grid-template-columns: 1fr; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    /* Section divider */
    .section-label {
      font-size: 12px; font-weight: 600;
      color: var(--text3); letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 0 4px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1; height: 1px;
      background: var(--border);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>

</div>

<!-- Archive Modal -->
<div class="modal-overlay" id="archiveModal">

//  INIT
// ─────────────────────────────────────────
function init() {
  // Header date
  const now = new Date();
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 · 每日简报`;

  // Category nav
  renderCatList();
  // Tags
  renderTagCloud();
  // Stats
  updateStats();
  // News
  renderNews();
  // Archive
  renderArchive();
}

// ─────────────────────────────────────────
//  CATEGORY
// ─────────────────────────────────────────
function renderCatList() {
  const el = document.getElementById('catList');
  el.innerHTML = COMPANIES.map(c => {
    const cnt = c.id === 'all' ? NEWS_DATA.length
      : NEWS_DATA.filter(n => n.company === c.id).length;
    return `
      <div class="cat-item${activeCompany===c.id?' active':''}"
           onclick="selectCompany('${c.id}')" style="--card-accent:${c.color}">
        <div class="cat-dot" style="background:${c.color}"></div>
        <span class="cat-name">${c.emoji} ${c.name}</span>
        <span class="cat-count">${cnt}</span>
      </div>`;
  }).join('');
}

function selectCompany(id) {
  activeCompany = id;
  visibleCount = 8;
  renderCatList();
  renderNews();
  updateSectionLabel();
}

// ─────────────────────────────────────────
//  TAGS
// ─────────────────────────────────────────
function renderTagCloud() {
  const el = document.getElementById('tagCloud');
  const allTags = [...new Set([...DEFAULT_TAGS, ...activeTags])];
  el.innerHTML = allTags.map(t => `
    <div class="tag${activeTags.has(t)?' active':''}" onclick="toggleTag('${t}')">${t}</div>
  `).join('');
}

function toggleTag(t) {
  if (activeTags.has(t)) activeTags.delete(t);
  else activeTags.add(t);
  renderTagCloud();
  showToast(activeTags.has(t) ? `已订阅「${t}」` : `已取消订阅「${t}」`);
}

function addCustomTag() {
  const input = document.getElementById('customTag');
  const val = input.value.trim();
  if (!val) return;
  activeTags.add(val);
  input.value = '';
  renderTagCloud();
  showToast(`已添加关键词「${val}」`);
}

// ─────────────────────────────────────────
//  FILTER & SORT
// ─────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  visibleCount = 8;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNews();
  updateSectionLabel();
}

function sortNews() {
  sortMode = document.getElementById('sortSelect').value;
  renderNews();
}

function filterNews() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  visibleCount = 8;
  renderNews();
  updateSectionLabel();
}

function getFiltered() {
  let data = [...NEWS_DATA];
  if (activeCompany !== 'all') data = data.filter(n => n.company === activeCompany);
  if (activeFilter !== 'all') data = data.filter(n => n.tag === activeFilter);
  if (searchQuery) data = data.filter(n =>
    n.title.toLowerCase().includes(searchQuery) ||
    n.summary.toLowerCase().includes(searchQuery));

  // Sort
  if (sortMode === 'time') {
    data.sort((a, b) => b.time.localeCompare(a.time));
  } else if (sortMode === 'hot') {
    data.sort((a, b) => (b.hot ? 1 : 0) - (a.hot ? 1 : 0) || b.time.localeCompare(a.time));
  } else if (sortMode === 'company') {
    data.sort((a, b) => a.company.localeCompare(b.company));
  }
  return data;
}

// ─────────────────────────────────────────
//  RENDER NEWS
// ─────────────────────────────────────────
const TAG_CLASS = {
  '产品发布': 'tag-product',
  '技术突破': 'tag-tech',
  '战略合作': 'tag-strategy',
  '人事变动': 'tag-personnel',
  '战略合作': 'tag-partnership',
};

function renderNews() {
  const filtered = getFiltered();
  const visible = filtered.slice(0, visibleCount);
  const grid = document.getElementById('newsGrid');

  if (visible.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>没有找到相关新闻，请调整筛选条件</p></div>`;
    document.getElementById('loadMoreBtn').style.display = 'none';
    return;
  }

  grid.innerHTML = visible.map(n => {
    const co = COMPANIES.find(c => c.id === n.company) || COMPANIES[0];
    const tagCls = TAG_CLASS[n.tag] || 'tag-product';
    return `
      <div class="news-card" id="card-${n.id}" style="--card-accent:${co.color}" onclick="toggleCard(${n.id})">
        <div class="card-top">
          <div class="company-badge" style="color:${co.color};border-color:${co.color}">
            <span class="company-logo">${co.emoji}</span>${co.name}
          </div>
          <span class="tag-badge ${tagCls}">${n.tag}</span>
          ${n.hot ? '<span class="hot-badge">🔥 热点</span>' : ''}
          <span class="card-time">${n.relTime}</span>
        </div>
        <div class="card-title">${n.title}</div>
        <div class="card-summary">${n.summary}</div>
        <div class="card-bottom">
          <a class="source-link" href="${n.sourceUrl}" target="_blank" onclick="event.stopPropagation()">
            🔗 ${n.source}
          </a>
          <span style="font-size:11px;color:var(--text3)">📅 ${n.time}</span>
          <button class="read-more" onclick="event.stopPropagation();toggleCard(${n.id})">展开全文 ▾</button>
        </div>
      </div>`;
  }).join('');

  const btn = document.getElementById('loadMoreBtn');
  btn.style.display = filtered.length > visibleCount ? 'block' : 'none';
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  card.classList.toggle('expanded');
  const btn = card.querySelector('.read-more');
  if (btn) btn.textContent = card.classList.contains('expanded') ? '收起 ▴' : '展开全文 ▾';
}

function loadMore() {
  visibleCount += 6;
  renderNews();
}

//  STATS

function updateStats() {
  document.getElementById('statTotal').textContent = NEWS_DATA.length;
  document.getElementById('statCo').textContent = new Set(NEWS_DATA.map(n => n.company)).size;
  document.getElementById('statHot').textContent = NEWS_DATA.filter(n => n.hot).length;
}

//  SECTION LABEL
// ─────────────────────────────────────────
function updateSectionLabel() {
  const el = document.getElementById('sectionLabel');
  const filtered = getFiltered();
  const co = COMPANIES.find(c => c.id === activeCompany);
  if (searchQuery) el.textContent = `搜索"${searchQuery}"：${filtered.length} 条结果`;
  else if (activeCompany !== 'all') el.textContent = `${co.emoji} ${co.name} · ${filtered.length} 条动态`;
  else if (activeFilter !== 'all') el.textContent = `${activeFilter} · ${filtered.length} 条`;
  else el.textContent = '今日简报';
}

// ─────────────────────────────────────────
//  ARCHIVE
// ─────────────────────────────────────────
function renderArchive() {
  const body = document.getElementById('archiveBody');
  body.innerHTML = Object.entries(ARCHIVE).map(([month, items]) => `
    <div class="archive-month">
      <h3>${month}</h3>
      ${items.map(item => {
        const co = COMPANIES.find(c => c.id === item.company) || COMPANIES[0];
        return `
          <div class="archive-item">
            <span class="archive-date">${item.date}</span>
            <span style="font-size:12px;margin-right:4px">${co.emoji}</span>
            <span class="archive-title">${item.title}</span>
          </div>`;
      }).join('')}
    </div>
  `).join('');
}

function openArchive() {
  document.getElementById('archiveModal').classList.add('open');
}
function closeArchive() {
  document.getElementById('archiveModal').classList.remove('open');
}
document.getElementById('archiveModal').addEventListener('click', function(e) {
  if (e.target === this) closeArchive();
});

// ─────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────
//  KEYBOARD
// ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeArchive();
});

// GO
init();
</script>
</body>
</html>
